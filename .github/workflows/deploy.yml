name: Deploy to Streamlit Cloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v3
      with:
        python-version: 3.9
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test imports
      run: |
        python -c "import streamlit; import pandas; import numpy; import sklearn; import xgboost; import plotly; print('All imports successful!')"
    
    - name: Check app syntax
      run: |
        python -m py_compile streamlit_app.py
        python -m py_compile app.py
        
    - name: Test Streamlit app (dry run)
      run: |
        echo "Streamlit app syntax check passed!"